<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet SS — Games</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

body {
  font-family: 'Inter', sans-serif;
  background:#000;
}

.pattern-grid {
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
</style>

</head>

<body class="bg-black text-white pattern-grid">

<nav class="fixed top-0 left-0 right-0 bg-black/80 backdrop-blur border-b border-white/10 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 font-bold">Comet SS</div>
</nav>

<section class="pt-32 px-6 pb-20">
<div class="max-w-7xl mx-auto">

<h1 class="text-6xl font-black mb-12">Comet Games</h1>

<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>
</section>

<script>
const games = [
  { id:'107800434678184', name:'AURA FARM' },
  { id:'110509672909570', name:'Swing Brainrot' },
  { id:'82769819426276', name:'WARBLOX' },
  { id:'139153100612917', name:'Run From Sammy' },
  { id:'127397808901834', name:'mm2 falso' }
];

const grid = document.getElementById('grid');

games.forEach(g => {
  const div = document.createElement('div');
  div.className = "bg-white/5 border border-white/10 rounded-xl p-5";

  div.innerHTML = `
    <img id="img-${g.id}" class="w-full h-40 object-cover rounded-lg mb-3 bg-white/10">
    <div class="font-bold">${g.name}</div>
    <div id="c-${g.id}" class="text-white/50 text-sm mt-1">Loading...</div>
  `;

  grid.appendChild(div);
});


// 🔥 MULTI PROXY FETCH
async function fetchWithFallback(urls) {
  for (let url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      return await res.json();
    } catch {}
  }
  throw new Error("All failed");
}


// ✅ THUMBNAILS (FIXED)
async function loadThumbnails() {
  const ids = games.map(g => g.id).join(',');

  const urls = [
    `https://thumbnails.roproxy.com/v1/games/icons?placeIds=${ids}&size=150x150&format=Png&isCircular=false`,
    `https://corsproxy.io/?https://thumbnails.roblox.com/v1/games/icons?placeIds=${ids}&size=150x150&format=Png&isCircular=false`
  ];

  try {
    const json = await fetchWithFallback(urls);

    json.data.forEach(t => {
      const img = document.getElementById(`img-${t.placeId}`);
      if (img) img.src = t.imageUrl;
    });

  } catch {
    console.log("thumbs dead");
  }
}


// ✅ PLAYERS (MULTI FIX)
async function fetchPlayers() {
  const ids = games.map(g => g.id).join(',');

  const urls = [
    `https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${ids}`,
    `https://corsproxy.io/?https://games.roblox.com/v1/games/multiget-place-details?placeIds=${ids}`
  ];

  try {
    const json = await fetchWithFallback(urls);

    const map = {};
    json.data.forEach(g => map[g.placeId] = g.playing);

    games.forEach(g => {
      const el = document.getElementById(`c-${g.id}`);
      el.innerText = `Players: ${map[g.id] ?? 0}`;
    });

  } catch {
    games.forEach(g => {
      document.getElementById(`c-${g.id}`).innerText = "API Blocked";
    });
  }
}


// INIT
loadThumbnails();
fetchPlayers();
setInterval(fetchPlayers, 30000);
</script>

</body>
</html>
