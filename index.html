<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet SS — Games</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

body {
  font-family: 'Inter', sans-serif;
  background:#000;
}

.pattern-grid {
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
</style>

</head>

<body class="bg-black text-white pattern-grid">

<!-- NAV -->

<nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 py-4 font-bold text-lg">
    Comet SS — Games
  </div>
</nav>

<!-- MAIN -->

<section class="pt-32 px-6 pb-20">
<div class="max-w-7xl mx-auto">

<h1 class="text-5xl md:text-6xl font-black mb-12">Live Games</h1>

<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>
</section>

<script>
const proxy = "https://workers-playground-lingering-flower-7582.nevergonnagiveyouroverflow.workers.dev";

const games = [
  { id:'107800434678184', name:'AURA FARM' },
  { id:'110509672909570', name:'Swing Brainrot' },
  { id:'82769819426276', name:'WARBLOX' },
  { id:'139153100612917', name:'Run From Sammy' },
  { id:'127397808901834', name:'mm2 falso' }
];

// build UI
const grid = document.getElementById('grid');

games.forEach(g => {
  const card = document.createElement('div');

  card.className = "bg-white/5 border border-white/10 rounded-xl p-5 backdrop-blur";

  card.innerHTML = `
    <img id="img-${g.id}" class="w-full h-40 object-cover rounded-lg mb-3 bg-white/10">
    <div class="font-bold text-lg">${g.name}</div>
    <div id="c-${g.id}" class="text-white/50 text-sm mt-2">Loading players...</div>
  `;

  grid.appendChild(card);
});


// 🔥 LOAD THUMBNAILS (WORKER ONLY)
async function loadThumbnails() {
  const ids = games.map(g => g.id).join(',');

  const url = `${proxy}/?url=${encodeURIComponent(
    `https://thumbnails.roblox.com/v1/games/icons?placeIds=${ids}&size=150x150&format=Png&isCircular=false`
  )}`;

  try {
    const res = await fetch(url);
    const json = await res.json();

    json.data.forEach(t => {
      const img = document.getElementById(`img-${t.placeId}`);
      if (img) img.src = t.imageUrl;
    });

  } catch (err) {
    console.log("Thumbnail error:", err);
  }
}


// 🔥 LOAD PLAYER COUNTS (WORKER ONLY)
async function fetchPlayers() {
  const ids = games.map(g => g.id).join(',');

  const url = `${proxy}/?url=${encodeURIComponent(
    `https://games.roblox.com/v1/games/multiget-place-details?placeIds=${ids}`
  )}`;

  try {
    const res = await fetch(url);
    const json = await res.json();

    const map = {};
    json.data.forEach(g => map[g.placeId] = g.playing);

    games.forEach(g => {
      const el = document.getElementById(`c-${g.id}`);
      el.innerText = `Players: ${map[g.id] ?? 0}`;
    });

  } catch (err) {
    console.log("Player API error:", err);

    games.forEach(g => {
      document.getElementById(`c-${g.id}`).innerText = "API Error";
    });
  }
}


// INIT
loadThumbnails();
fetchPlayers();
setInterval(fetchPlayers, 30000);
</script>

</body>
</html>
