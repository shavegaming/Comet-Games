<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet SS | Games</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #0a0e1a;
    color: #fff;
    min-height: 100vh;
}

.container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

header { margin-bottom: 50px; padding-bottom: 20px; border-bottom: 2px solid #1e293b; }

h1 { color: #3b82f6; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }

.subtitle { color: #64748b; font-size: 1rem; }

.games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
}

.game-card {
    background: #151b29;
    border-radius: 10px;
    padding: 25px;
    border: 1px solid #1e293b;
    transition: all 0.3s ease, opacity 0.5s ease;
    opacity: 0;
}

.game-card.visible { opacity: 1; }

.game-card:hover {
    border-color: #3b82f6;
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(59,130,246,0.3);
}

.game-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }

.game-icon {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background: #1e293b;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.game-icon.loaded { opacity: 1; }

.game-title { font-size: 1.3rem; font-weight: 600; }

.game-genre { font-size: 0.9rem; color: #64748b; }

.player-info {
    background: #0a0e1a;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.player-label { color: #64748b; font-size: 0.85rem; margin-bottom: 5px; }

.player-count {
    font-size: 1.5rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #4ade80;
}

.player-count.loading { font-size: 1rem; color: #64748b; }

.player-count.error { font-size: 0.9rem; color: #f87171; }

.pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 1 }
    50% { opacity: 0.5 }
}

.join-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: #fff;
    text-align: center;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
}

.join-btn:hover { background: #2563eb; }

footer {
    margin-top: 60px;
    padding-top: 30px;
    border-top: 2px solid #1e293b;
    text-align: center;
    color: #64748b;
}

.refresh-info {
    text-align: center;
    color: #64748b;
    font-size: 0.85rem;
    margin-top: 30px;
}
</style>
</head>

<body>
<div class="container">

<header>
    <h1>Comet SS | Games</h1>
    <p class="subtitle">Real-time player counts • Updated automatically</p>
</header>

<div class="games-grid" id="gamesGrid"></div>

<div class="refresh-info">
    Player counts update every 30 seconds
</div>

<footer>
    <p>&copy; 2026 Comet SS</p>
</footer>

</div>

<script>
const games = [
    { placeId: '114298054503384', name: '🎲 Kick RNG 🔥 (CRAZY DROPS!)', genre: 'RNG' },
    { placeId: '133091376554829', name: '[🌊] Escape Waves For Lucky Blocks', genre: 'Brainrot' },
    { placeId: '133489210470821', name: 'Comet Hangout', genre: 'Hangout' },
    { placeId: '121942690506017', name: 'Forsaken Doors Edition REBORN', genre: 'Horror' },
    { placeId: '10673689549', name: 'Multi obby', genre: 'Obby' },
    { placeId: '137010059674036', name: '[💘] Slap Tower 🖐️ [X999]', genre: 'Obby' },
];

function createGameCard(game, index) {
    const card = document.createElement('div');
    card.className = 'game-card';

    card.innerHTML = `
        <div class="game-header">
            <img class="game-icon"
                src="https://www.roblox.com/asset-thumbnail/image?assetId=${game.placeId}&width=150&height=150&format=png">
            <div>
                <div class="game-title">${game.name}</div>
                <div class="game-genre">${game.genre}</div>
            </div>
        </div>

        <div class="player-info">
            <div class="player-label">Active Players</div>
            <div class="player-count loading" id="players-${game.placeId}">Loading...</div>
        </div>

        <a href="https://www.roblox.com/games/${game.placeId}" target="_blank" class="join-btn">
            Join Game
        </a>
    `;

    document.getElementById('gamesGrid').appendChild(card);

    setTimeout(() => card.classList.add('visible'), index * 100);

    const img = card.querySelector('.game-icon');
    img.onload = () => img.classList.add('loaded');
}

/* FIXED FETCH (USES PROXY SO IT DOESN’T FAIL) */
async function updatePlayerCounts() {
    const ids = games.map(g => g.placeId).join(',');

    try {
        const res = await fetch(
            `https://api.allorigins.win/raw?url=https://games.roblox.com/v1/games/multiget-place-details?placeIds=${ids}`
        );

        const data = await res.json();

        data.data.forEach(game => {
            const el = document.getElementById(`players-${game.placeId}`);
            if (!el) return;

            el.innerHTML = `<span class="pulse"></span>${game.playing.toLocaleString()} online`;
            el.className = 'player-count';
        });

    } catch (e) {
        document.querySelectorAll('.player-count').forEach(el => {
            el.textContent = 'Unable to load';
            el.className = 'player-count error';
        });
    }
}

games.forEach(createGameCard);
updatePlayerCounts();
setInterval(updatePlayerCounts, 30000);
</script>

</body>
</html>
